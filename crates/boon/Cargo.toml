[package]
name = "boon-deadlock"
version = "0.0.0"
edition = "2024"
description = "Boon is a Deadlock demo / replay file parser"

[dependencies]
anyhow = "1.0.99"
bytes = "1.10.1"
snap = "1.1.1"
thiserror = "2.0.16"
tokio = { version = "1.47.1", features = ["full"] }

boon-proto = { workspace = true }

[profile.dev]
opt-level = 1

[lib]
name = "boon"
path = "src/lib.rs"
