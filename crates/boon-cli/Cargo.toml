[package]
name = "boon-cli"
version = "0.0.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
colored = "2"
serde_json = "1.0"

boon = { package = "boon-deadlock", path = "../boon" }
boon-proto = { workspace = true }

[[bin]]
name = "boon"
path = "src/main.rs"