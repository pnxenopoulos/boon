name: Release Parser

on:
  push:
    tags:
      - "boon-v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#boon-v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches workspace version
        run: |
          CARGO_VERSION=$(grep -A2 '^\[workspace\.package\]' Cargo.toml | grep 'version' | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match workspace version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2

      - name: Publish boon-proto
        run: cargo publish -p boon-proto
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish boon-deadlock
        run: cargo publish -p boon-deadlock
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
