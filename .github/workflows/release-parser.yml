name: Release Parser

on:
  push:
    tags:
      - "boon-v*"

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-gate:
    name: Verify CI passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          RESULT=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs" \
            --jq '.check_runs[] | select(.name == "CI Check") | .conclusion')
          if [ "$RESULT" != "success" ]; then
            echo "CI Check has not passed on ${SHA} (got: ${RESULT:-not found})"
            echo "Push to main and wait for CI before tagging a release."
            exit 1
          fi

  publish:
    name: Publish to crates.io
    needs: ci-gate
    runs-on: ubuntu-latest
    environment: crates
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#boon-v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches workspace version
        run: |
          CARGO_VERSION=$(grep -A2 '^\[workspace\.package\]' Cargo.toml | grep '^version' | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match workspace version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2

      - name: Publish boon-proto
        run: cargo publish -p boon-proto --registry crates-io

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish boon-deadlock
        run: cargo publish -p boon-deadlock --registry crates-io
