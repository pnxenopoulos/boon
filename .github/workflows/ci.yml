name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable) + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: fmt-${{ runner.os }}-stable

      - name: rustfmt
        run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable) + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ runner.os }}-stable

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.rust }})
    needs: [fmt, clippy]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (${{ matrix.rust }}) + components
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build
        run: cargo build --workspace --all-features --locked

      - name: Test
        run: |
          mkdir -p target/nextest
          cargo nextest run \
            --workspace --all-features \
            --failure-output immediate-final

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable) + components (incl. llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage-${{ runner.os }}-stable

      - name: Install cargo-nextest & cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: |
            nextest
            cargo-llvm-cov

      - name: Clean coverage artifacts
        run: cargo llvm-cov clean --workspace

      - name: Run coverage and print summary
        run: |
          cargo llvm-cov nextest --workspace --all-features
          echo "------ Coverage Summary ------"
          cargo llvm-cov report --summary-only