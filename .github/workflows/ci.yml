name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable) + rustfmt, clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: lint-${{ runner.os }}-stable

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  test-rust:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-${{ matrix.rust }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build
        run: cargo build --workspace --all-features --locked --exclude boon-python

      - name: Test
        run: cargo nextest run --workspace --all-features --locked --exclude boon-python --failure-output immediate-final

  test-python:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    env:
      # Space-separated list of public URLs for demo fixture files.
      DEMO_URLS: "https://github.com/pnxenopoulos/boon-fixtures/releases/download/70555151/70555151.dem https://github.com/pnxenopoulos/boon-fixtures/releases/download/70537442/70537442.dem"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ runner.os }}-${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download demo fixtures
        working-directory: crates/boon-python
        run: |
          mkdir -p tests/fixtures
          if [ -n "$DEMO_URLS" ]; then
            for url in $DEMO_URLS; do
              echo "Downloading $url ..."
              curl -fSL --retry 3 -o "tests/fixtures/$(basename "$url")" "$url"
            done
          else
            echo "No DEMO_URLS configured — skipping fixture download"
          fi

      - name: Install dependencies and build wheel
        working-directory: crates/boon-python
        run: |
          uv sync
          uv run maturin develop

      - name: Run pytest
        working-directory: crates/boon-python
        run: uv run pytest tests/ -v

  dry-run-publish-parser:
    name: Dry Run (crates.io)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: dry-run-parser-${{ runner.os }}

      - name: cargo publish --dry-run (boon-proto)
        run: cargo publish --dry-run -p boon-proto

      # boon-deadlock depends on boon-proto, which cargo publish --dry-run
      # tries to resolve from crates.io. We use cargo package instead to
      # validate metadata and file inclusion without registry resolution.
      - name: cargo package (boon-deadlock)
        run: cargo package -p boon-deadlock

  dry-run-publish-python:
    name: Dry Run (PyPI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m crates/boon-python/Cargo.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/boon-python/Cargo.toml

      - name: Verify dist contents
        run: ls -lh dist/

  docs:
    name: Sphinx Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Sphinx dependencies
        run: pip install -r crates/boon-python/docs/requirements.txt

      - name: Build docs
        working-directory: crates/boon-python/docs
        run: sphinx-build -W -b html . _build/html

  check:
    name: CI Check
    if: always()
    needs: [lint, deny, test-rust, test-python, docs, dry-run-publish-parser, dry-run-publish-python]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.deny.result }}" != "success" ||
                "${{ needs.test-rust.result }}" != "success" ||
                "${{ needs.test-python.result }}" != "success" ||
                "${{ needs.docs.result }}" != "success" ||
                "${{ needs.dry-run-publish-parser.result }}" != "success" ||
                "${{ needs.dry-run-publish-python.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

  coverage:
    name: Coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (stable) + components (incl. llvm-tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage-${{ runner.os }}-stable

      - name: Install cargo-nextest & cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: |
            nextest
            cargo-llvm-cov

      - name: Clean coverage artifacts
        run: cargo llvm-cov clean --workspace

      - name: Run coverage and print summary
        run: |
          cargo llvm-cov nextest --workspace --all-features
          echo "------ Coverage Summary ------"
          cargo llvm-cov report --summary-only
