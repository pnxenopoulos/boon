[workspace]
exclude = [
  "scripts/build-protos",
  "scripts/compute-abilities-hash-table",
]
members = [
  "crates/boon",
  "crates/boon-cli",
  "crates/boon-proto",
  "crates/boon-python",
]
resolver = "2"

[workspace.dependencies]
boon = { path = "crates/boon", package = "boon-deadlock" }
boon-proto = { path = "crates/boon-proto" }

[profile.release]
lto = true          # Link-time optimization
codegen-units = 1   # Better optimization, slower compile