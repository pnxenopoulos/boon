# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Check all crates (workspace + transitive) for advisories.
version = 2
# pyo3 0.27 (pulled in directly and transitively via pyo3-polars) has two
# advisories fixed only in pyo3 >= 0.29. We can't upgrade yet: the latest
# pyo3-polars (0.27.0) still pins pyo3 ^0.28, and pyo3 0.28 is also affected, so
# no published combination reaches a fixed pyo3 while keeping pyo3-polars.
# Re-evaluate / remove these when pyo3-polars supports pyo3 >= 0.29.
ignore = [
    "RUSTSEC-2026-0176", # OOB read in PyList/PyTuple nth/nth_back iterators
    "RUSTSEC-2026-0177", # missing Sync bound on PyCFunction::new_closure
]

[licenses]
# Boon is MIT-licensed. Allow permissive and weak-copyleft licenses.
# Unlisted licenses are denied by default.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

# polars-arrow-format ships a LICENSE file (Apache-2.0) but has no SPDX
# field in its Cargo.toml manifest.
[[licenses.clarify]]
name = "polars-arrow-format"
expression = "Apache-2.0"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
# Warn on multiple versions of the same crate in the dependency tree.
multiple-versions = "warn"
# Allow all wildcard dependencies (common in workspaces).
wildcards = "allow"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
